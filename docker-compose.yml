services:
  web:
    build: .
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - magnetosphere_ru

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8888:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - magnetosphere_ru

networks:
  magnetosphere_ru:
    driver: bridge
