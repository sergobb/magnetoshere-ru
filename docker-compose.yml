services:
  web:
    build: .
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - magnetosphere_ru

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8888:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - old
    restart: unless-stopped
    networks:
      - magnetosphere_ru

  old:
    image: php:8.2-apache
    ports:
      - "8889:80"
    volumes:
      - ./old:/var/www/html
      - ./old.conf:/etc/apache2/conf-enabled/old.conf:ro
    restart: unless-stopped
    networks:
      - magnetosphere_ru

networks:
  magnetosphere_ru:
    driver: bridge
